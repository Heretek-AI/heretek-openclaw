# ==============================================================================
# Anthropic Provider Template for LiteLLM
# ==============================================================================
# Models: Claude-3-Opus, Claude-3-Sonnet, Claude-3-Haiku, Claude-3.5-Sonnet
# API Documentation: https://docs.anthropic.com/claude/docs
# LiteLLM Documentation: https://docs.litellm.ai/docs/providers/anthropic
# ==============================================================================
# Required Environment Variables:
#   - ANTHROPIC_API_KEY: Your Anthropic API key (sk-ant-...)
#   - ANTHROPIC_API_BASE: Optional custom API base URL
# ==============================================================================

model_list:
  # ==========================================================================
  # Claude 3.5 Models
  # ==========================================================================
  
  - model_name: anthropic/claude-3-5-sonnet
    litellm_params:
      model: claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Claude 3.5 Sonnet - Latest Sonnet with improved intelligence"
      max_tokens: 8192
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015
      supports_function_calling: true
      supports_vision: true

  - model_name: anthropic/claude-3-5-haiku
    litellm_params:
      model: claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Claude 3.5 Haiku - Fast and efficient model"
      max_tokens: 8192
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000005
      supports_function_calling: true
      supports_vision: true

  # ==========================================================================
  # Claude 3 Models
  # ==========================================================================
  
  - model_name: anthropic/claude-3-opus
    litellm_params:
      model: claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Claude 3 Opus - Most powerful model for complex tasks"
      max_tokens: 4096
      input_cost_per_token: 0.000015
      output_cost_per_token: 0.000075
      supports_function_calling: true
      supports_vision: true

  - model_name: anthropic/claude-3-sonnet
    litellm_params:
      model: claude-3-sonnet-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Claude 3 Sonnet - Balanced performance model"
      max_tokens: 4096
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015
      supports_function_calling: true
      supports_vision: true

  - model_name: anthropic/claude-3-haiku
    litellm_params:
      model: claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Claude 3 Haiku - Fastest and most compact model"
      max_tokens: 4096
      input_cost_per_token: 0.00000025
      output_cost_per_token: 0.00000125
      supports_function_calling: true
      supports_vision: true

  # ==========================================================================
  # Legacy Claude Models
  # ==========================================================================
  
  - model_name: anthropic/claude-2.1
    litellm_params:
      model: claude-2.1
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Claude 2.1 - Legacy model with 200K context"
      max_tokens: 4096
      input_cost_per_token: 0.000008
      output_cost_per_token: 0.000024

  - model_name: anthropic/claude-2
    litellm_params:
      model: claude-2
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Claude 2 - Legacy model"
      max_tokens: 4096
      input_cost_per_token: 0.000008
      output_cost_per_token: 0.000024

  # ==========================================================================
  # Model Aliases (Convenience)
  # ==========================================================================
  
  - model_name: anthropic/default
    litellm_params:
      model: claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Default - Points to Claude 3.5 Sonnet"

  - model_name: anthropic/powerful
    litellm_params:
      model: claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Powerful - Points to Claude 3 Opus"

  - model_name: anthropic/fast
    litellm_params:
      model: claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Fast - Points to Claude 3 Haiku"

  - model_name: anthropic/cheap
    litellm_params:
      model: claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Cheap - Points to Claude 3 Haiku"

  - model_name: anthropic/vision
    litellm_params:
      model: claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: os.environ/ANTHROPIC_API_BASE
    model_info:
      description: "Anthropic Vision - Points to Claude 3.5 Sonnet for vision tasks"
