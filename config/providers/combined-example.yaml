# ==============================================================================
# Combined Multi-Provider Example for LiteLLM
# ==============================================================================
# This file demonstrates how to configure multiple providers in a single
# LiteLLM configuration. It includes examples from all provider templates.
# ==============================================================================
# Required Environment Variables:
#   - OPENAI_API_KEY
#   - ANTHROPIC_API_KEY
#   - GOOGLE_API_KEY
#   - OLLAMA_HOST
#   - AZURE_API_KEY, AZURE_API_BASE, AZURE_API_VERSION
#   - XAI_API_KEY
#   - MINIMAX_API_KEY, MINIMAX_API_BASE (OpenClaw default)
#   - ZAI_API_KEY, ZAI_API_BASE (OpenClaw failover)
# ==============================================================================

model_list:
  # ==========================================================================
  # OPENAI MODELS
  # ==========================================================================
  
  - model_name: openai/gpt-4o
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-4o - Optimized GPT-4"
      max_tokens: 128000
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000015
      supports_vision: true
      supports_function_calling: true

  - model_name: openai/gpt-4-turbo
    litellm_params:
      model: gpt-4-turbo
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-4 Turbo"
      max_tokens: 128000
      input_cost_per_token: 0.00001
      output_cost_per_token: 0.00003

  - model_name: openai/gpt-3.5-turbo
    litellm_params:
      model: gpt-3.5-turbo
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "OpenAI GPT-3.5 Turbo - Fast and cost-effective"
      max_tokens: 16385
      input_cost_per_token: 0.0000005
      output_cost_per_token: 0.0000015

  # ==========================================================================
  # ANTHROPIC MODELS
  # ==========================================================================
  
  - model_name: anthropic/claude-3-5-sonnet
    litellm_params:
      model: claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Anthropic Claude 3.5 Sonnet - Latest Sonnet"
      max_tokens: 8192
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015
      supports_vision: true
      supports_function_calling: true

  - model_name: anthropic/claude-3-opus
    litellm_params:
      model: claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Anthropic Claude 3 Opus - Most powerful"
      max_tokens: 4096
      input_cost_per_token: 0.000015
      output_cost_per_token: 0.000075

  - model_name: anthropic/claude-3-haiku
    litellm_params:
      model: claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Anthropic Claude 3 Haiku - Fast and compact"
      max_tokens: 4096
      input_cost_per_token: 0.00000025
      output_cost_per_token: 0.00000125

  # ==========================================================================
  # GOOGLE MODELS
  # ==========================================================================
  
  - model_name: google/gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Google Gemini 1.5 Pro - Advanced multimodal"
      max_tokens: 2097152
      input_cost_per_token: 0.0000035
      output_cost_per_token: 0.0000105
      supports_vision: true

  - model_name: google/gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Google Gemini 1.5 Flash - Fast and efficient"
      max_tokens: 1048576
      input_cost_per_token: 0.00000035
      output_cost_per_token: 0.00000105

  # ==========================================================================
  # OLLAMA MODELS (Local)
  # ==========================================================================
  
  - model_name: ollama/llama3.1
    litellm_params:
      model: ollama/llama3.1
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 3.1 - Local deployment"
      max_tokens: 131072
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/mistral
    litellm_params:
      model: ollama/mistral
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Mistral 7B - Local deployment"
      max_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/codellama
    litellm_params:
      model: ollama/codellama
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "CodeLlama - Local code model"
      max_tokens: 16384
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ==========================================================================
  # AZURE OPENAI MODELS
  # ==========================================================================
  
  - model_name: azure/gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION
    model_info:
      description: "Azure OpenAI GPT-4o"
      max_tokens: 128000
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000015

  - model_name: azure/gpt-35-turbo
    litellm_params:
      model: azure/gpt-35-turbo
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION
    model_info:
      description: "Azure OpenAI GPT-35-Turbo"
      max_tokens: 16385
      input_cost_per_token: 0.0000005
      output_cost_per_token: 0.0000015

  # ==========================================================================
  # XAI MODELS
  # ==========================================================================
  
  - model_name: xai/grok-2
    litellm_params:
      model: xai/grok-2
      api_key: os.environ/XAI_API_KEY
    model_info:
      description: "xAI Grok-2 - Latest Grok model"
      max_tokens: 131072
      input_cost_per_token: 0.000002
      output_cost_per_token: 0.00001

  - model_name: xai/grok-2-mini
    litellm_params:
      model: xai/grok-2-mini
      api_key: os.environ/XAI_API_KEY
    model_info:
      description: "xAI Grok-2 Mini - Lightweight Grok"
      max_tokens: 131072
      input_cost_per_token: 0.0000005
      output_cost_per_token: 0.0000025

  # ==========================================================================
  # MINIMAX MODELS (OpenClaw Default)
  # ==========================================================================
  
  - model_name: minimax/MiniMax-M2.7
    litellm_params:
      model: minimax/MiniMax-M2.7
      api_key: os.environ/MINIMAX_API_KEY
      api_base: os.environ/MINIMAX_API_BASE
    model_info:
      description: "MiniMax MiniMax-M2.7 - Primary model for all agents"
      max_tokens: 128000
      input_cost_per_token: 0.0000001
      output_cost_per_token: 0.0000004

  - model_name: minimax/MiniMax-M2.5
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: os.environ/MINIMAX_API_BASE
    model_info:
      description: "MiniMax MiniMax-M2.5 - Legacy fallback"
      max_tokens: 128000

  # ==========================================================================
  # Z.AI MODELS (OpenClaw Failover)
  # ==========================================================================
  
  - model_name: zai/glm-5-1
    litellm_params:
      model: openai/glm-5-1
      api_key: os.environ/ZAI_API_KEY
      api_base: os.environ/ZAI_API_BASE
    model_info:
      description: "z.ai GLM-5.1 - Coding API failover"
      max_tokens: 128000

  - model_name: zai/glm-4
    litellm_params:
      model: openai/glm-4
      api_key: os.environ/ZAI_API_KEY
      api_base: os.environ/ZAI_API_BASE
    model_info:
      description: "z.ai GLM-4 - Alternative failover"
      max_tokens: 128000

  # ==========================================================================
  # AGENT PASSTHROUGH ENDPOINTS (Example with Multi-Provider)
  # ==========================================================================
  
  - model_name: agent/steward
    litellm_params:
      model: anthropic/claude-3-5-sonnet
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Steward Agent - Orchestrator role (Claude 3.5 Sonnet)"
      agent_role: orchestrator
      agent_id: steward

  - model_name: agent/alpha
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "Alpha Agent - Triad role (GPT-4o)"
      agent_role: triad
      agent_id: alpha

  - model_name: agent/beta
    litellm_params:
      model: google/gemini-1.5-pro
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      description: "Beta Agent - Triad role (Gemini Pro)"
      agent_role: triad
      agent_id: beta

  - model_name: agent/charlie
    litellm_params:
      model: xai/grok-2
      api_key: os.environ/XAI_API_KEY
    model_info:
      description: "Charlie Agent - Triad role (Grok-2)"
      agent_role: triad
      agent_id: charlie

  - model_name: agent/coder
    litellm_params:
      model: ollama/codellama
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Coder Agent - Artisan role (CodeLlama local)"
      agent_role: artisan
      agent_id: coder

  # ==========================================================================
  # MODEL ALIASES
  # ==========================================================================
  
  - model_name: default
    litellm_params:
      model: minimax/MiniMax-M2.7
      api_key: os.environ/MINIMAX_API_KEY
      api_base: os.environ/MINIMAX_API_BASE

  - model_name: fast
    litellm_params:
      model: anthropic/claude-3-haiku
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: cheap
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: os.environ/OPENAI_API_KEY

  - model_name: powerful
    litellm_params:
      model: anthropic/claude-3-opus
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: local
    litellm_params:
      model: ollama/llama3.1
      api_base: os.environ/OLLAMA_HOST

  - model_name: failover
    litellm_params:
      model: zai/glm-5-1
      api_key: os.environ/ZAI_API_KEY
      api_base: os.environ/ZAI_API_BASE

# ==============================================================================
# Router Settings for Multi-Provider
# ==============================================================================
router_settings:
  routing_strategy: simple-shuffle
  enable_rate_limiting: true
  default_limit_requests: 60
  default_limit_period: 60
  
  # Priority fallback across providers
  priority_fallback:
    enabled: true
    fallback_order:
      - minimax/MiniMax-M2.7
      - anthropic/claude-3-5-sonnet
      - openai/gpt-4o
      - google/gemini-1.5-pro
      - xai/grok-2
      - zai/glm-5-1

# ==============================================================================
# Fallback Models
# ==============================================================================
fallback_models:
  - minimax/MiniMax-M2.7
  - minimax/MiniMax-M2.5
  - anthropic/claude-3-5-sonnet
  - openai/gpt-4o
  - google/gemini-1.5-flash
  - zai/glm-5-1
