# ==============================================================================
# Ollama Provider Template for LiteLLM
# ==============================================================================
# Models: Llama-2, Llama-3, Mistral, CodeLlama, and other local models
# API Documentation: https://github.com/ollama/ollama/blob/main/docs/api.md
# LiteLLM Documentation: https://docs.litellm.ai/docs/providers/ollama
# ==============================================================================
# Required Environment Variables:
#   - OLLAMA_HOST: Ollama server URL (default: http://ollama:11434)
#   - OLLAMA_API_KEY: Not required for local Ollama (can be empty)
# ==============================================================================
# Note: Pull models before using with: ollama pull <model-name>
# ==============================================================================

model_list:
  # ==========================================================================
  # Llama 3 Models
  # ==========================================================================
  
  - model_name: ollama/llama3.1
    litellm_params:
      model: ollama/llama3.1
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 3.1 - Latest Llama model (8B)"
      max_tokens: 131072
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/llama3.1-70b
    litellm_params:
      model: ollama/llama3.1:70b
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 3.1 70B - Large Llama model"
      max_tokens: 131072
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/llama3.1-405b
    litellm_params:
      model: ollama/llama3.1:405b
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 3.1 405B - Largest Llama model"
      max_tokens: 131072
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/llama3
    litellm_params:
      model: ollama/llama3
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 3 - Original Llama 3 (8B)"
      max_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/llama3-70b
    litellm_params:
      model: ollama/llama3:70b
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 3 70B - Large Llama 3 model"
      max_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ==========================================================================
  # Llama 2 Models
  # ==========================================================================
  
  - model_name: ollama/llama2
    litellm_params:
      model: ollama/llama2
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 2 - Original Llama 2 (7B)"
      max_tokens: 4096
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/llama2-13b
    litellm_params:
      model: ollama/llama2:13b
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 2 13B - Medium Llama 2 model"
      max_tokens: 4096
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/llama2-70b
    litellm_params:
      model: ollama/llama2:70b
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Meta Llama 2 70B - Large Llama 2 model"
      max_tokens: 4096
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ==========================================================================
  # Mistral Models
  # ==========================================================================
  
  - model_name: ollama/mistral
    litellm_params:
      model: ollama/mistral
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Mistral 7B - Efficient and capable model"
      max_tokens: 8192
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: ollama/mistral-large
    litellm_params:
