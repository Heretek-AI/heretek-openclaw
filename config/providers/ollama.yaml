      output_cost_per_token: 0.0

  - model_name: ollama/mixtral
    litellm_params:
      model: ollama/mixtral-8x7b
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Mixtral 8x7B - Mixture of experts model"
      max_tokens: 32768
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ==========================================================================
  # Code Models
  # ==========================================================================
  
  - model_name: ollama/codellama
    litellm_params:
      model: ollama/codellama
      api_base: os.environ/OLLAMA_HOST
