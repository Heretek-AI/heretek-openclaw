    model_info:
      description: "All-MiniLM - Lightweight embedding model"
      mode: embedding
      embedding_dim: 384
      input_cost_per_token: 0.0

  # ==========================================================================
  # Model Aliases (Convenience)
  # ==========================================================================
  
  - model_name: ollama/default
    litellm_params:
      model: ollama/llama3.1
      api_base: os.environ/OLLAMA_HOST
    model_info:
      description: "Ollama Default - Points to Llama 3.1"

  - model_name: ollama/fast
    litellm_params:
      model: ollama/phi3-mini
      api_base: os.environ/OLLAMA_HOST
